<!doctype html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center h-screen">

<div class="bg-slate-800 p-8 rounded-2xl w-96 shadow-xl">
  <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

  <form id="loginForm" class="flex flex-col gap-4">
    <input type="email" id="email" placeholder="Email"
      class="p-3 rounded bg-slate-700 outline-none" required>

    <input type="password" id="password" placeholder="Password"
      class="p-3 rounded bg-slate-700 outline-none" required>

    <button class="bg-emerald-500 p-3 rounded font-bold hover:bg-emerald-400">
      Login
    </button>
  </form>

  <p class="text-sm mt-4 text-center">
    Don't have an account?
    <a href="/auth/register" class="text-emerald-400">Register</a>
  </p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  if (res.ok) {
    window.location.href = '/';
  } else {
    alert('Invalid credentials');
  }
});
</script>

</body>
</html>
