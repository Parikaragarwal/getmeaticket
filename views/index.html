<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --gold: #f5c842;
        --gold-dim: #c9a62e;
        --crimson: #e63946;
        --cream: #fdf6e3;
        --ink: #0d0d0d;
        --curtain: #1a0a0a;
        --panel: #110808;
        --border: rgba(245,200,66,0.18);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Syne', sans-serif;
        background-color: var(--curtain);
        color: var(--cream);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Film grain overlay */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      /* Vignette */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
        pointer-events: none;
        z-index: 0;
      }

      .page-wrap {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 2.5rem 2rem 4rem;
      }

      /* TOP BAR */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 3rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
      }

      .topbar-logo {
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--gold-dim);
      }

      .logout-btn {
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.45rem 1.2rem;
        border: 1px solid var(--border);
        background: transparent;
        color: rgba(253,246,227,0.45);
        cursor: pointer;
        transition: all 0.2s ease;
        border-radius: 2px;
      }

      .logout-btn:hover {
        border-color: var(--crimson);
        color: var(--crimson);
        background: rgba(230,57,70,0.06);
      }

      /* HERO TITLE */
      .hero {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      .now-showing {
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--gold-dim);
        margin-bottom: 1rem;
        display: block;
      }

      .film-title {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: clamp(2.4rem, 6vw, 4.5rem);
        line-height: 1.0;
        color: var(--cream);
        letter-spacing: -0.02em;
        margin-bottom: 0.6rem;
      }

      .film-title span.accent {
        color: var(--gold);
        display: block;
      }

      .film-tagline {
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        color: rgba(253,246,227,0.35);
        margin-top: 1rem;
        font-style: italic;
      }

      /* DECORATIVE STRIPE */
      .stripe {
        display: flex;
        align-items: center;
        gap: 1rem;
        justify-content: center;
        margin: 0 auto 2.5rem;
        max-width: 320px;
      }
      .stripe-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim)); }
      .stripe-line.r { background: linear-gradient(to left, transparent, var(--gold-dim)); }
      .stripe-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }

      /* LEGEND */
      .legend {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 2.5rem;
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        color: rgba(253,246,227,0.5);
      }

      .dot-avail {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 8px rgba(245,200,66,0.5);
      }

      .dot-booked {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: transparent;
        border: 1px solid rgba(230,57,70,0.4);
      }

      .legend-sep {
        width: 1px;
        height: 18px;
        background: var(--border);
      }

      /* SCREEN BAR */
      .screen-wrap {
        text-align: center;
        margin-bottom: 2.5rem;
        position: relative;
      }
      .screen-bar {
        display: inline-block;
        width: min(580px, 90%);
        height: 4px;
        background: linear-gradient(to right, transparent, rgba(245,200,66,0.55), transparent);
        border-radius: 2px;
        margin-bottom: 0.5rem;
      }
      .screen-label {
        font-family: 'Space Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(253,246,227,0.22);
      }

      /* SEAT TABLE WRAPPER */
      .grid-outer {
        display: flex;
        justify-content: center;
      }

      .grid-inner {
        background: rgba(10,4,4,0.6);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2.5rem;
      }

      /* SEATS — these classes are applied via JS, matching the originals but reskinned */
      #tbl {
        /* border-separate: separate; */
        border-spacing: 10px !important;
      }

      /* Override the seat cells injected by JS */
      #tbl td {
        transition: transform 0.18s ease, box-shadow 0.18s ease !important;
      }

      /* Available seats overrides */
      #tbl td.seat-avail,
      #tbl td[class*="bg-emerald"] {
        background: transparent !important;
        border: 1.5px solid var(--gold) !important;
        color: var(--gold) !important;
        box-shadow: inset 0 0 0 0 transparent, 0 0 10px rgba(245,200,66,0.1) !important;
      }

      #tbl td[class*="bg-emerald"]:hover {
        background: rgba(245,200,66,0.12) !important;
        box-shadow: 0 0 20px rgba(245,200,66,0.3), inset 0 0 12px rgba(245,200,66,0.06) !important;
        transform: translateY(-3px) !important;
        border-color: var(--gold) !important;
      }

      /* Booked seats overrides */
      #tbl td[class*="bg-rose"] {
        background: rgba(230,57,70,0.04) !important;
        border: 1px solid rgba(230,57,70,0.18) !important;
        color: rgba(230,57,70,0.35) !important;
      }

      /* Tooltip fix — keep it visible and styled */
      #tbl td .absolute {
        font-family: 'Space Mono', monospace !important;
        font-size: 0.62rem !important;
        background: #1a0808 !important;
        border: 1px solid rgba(245,200,66,0.2) !important;
        color: rgba(253,246,227,0.7) !important;
      }

      #tbl td .absolute span.font-bold {
        color: var(--gold) !important;
      }

      /* Seat number font */
      #tbl td span {
        font-family: 'Space Mono', monospace;
        font-size: 0.75rem !important;
        letter-spacing: 0.05em;
      }

      /* Row label helper (cosmetic only, added via JS) */
      .row-label {
        font-family: 'Space Mono', monospace;
        font-size: 0.6rem;
        color: rgba(253,246,227,0.2);
        text-align: right;
        padding-right: 10px;
        vertical-align: middle;
        letter-spacing: 0.1em;
      }

      /* FOOTER */
      .footer {
        text-align: center;
        margin-top: 3.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        font-family: 'Space Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        color: rgba(253,246,227,0.18);
        text-transform: uppercase;
      }

      /* Entrance animation */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .hero, .legend, .screen-wrap, .grid-outer {
        animation: fadeUp 0.6s ease both;
      }
      .legend { animation-delay: 0.1s; }
      .screen-wrap { animation-delay: 0.15s; }
      .grid-outer { animation-delay: 0.25s; }

      /* Alert style override — we swap window.alert */
      .ci-alert-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: fadeUp 0.2s ease;
      }
      .ci-alert-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2.5rem 3rem;
        max-width: 380px;
        width: 90%;
        text-align: center;
        font-family: 'Space Mono', monospace;
      }
      .ci-alert-box p {
        font-size: 0.8rem;
        color: var(--cream);
        line-height: 1.7;
        margin-bottom: 1.5rem;
        letter-spacing: 0.05em;
      }
      .ci-alert-box p.success { color: var(--gold); }
      .ci-alert-box p.error   { color: var(--crimson); }
      .ci-alert-btn {
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.55rem 1.6rem;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--cream);
        cursor: pointer;
        transition: all 0.15s;
        border-radius: 2px;
      }
      .ci-alert-btn:hover { border-color: var(--gold); color: var(--gold); }
    </style>
  </head>
  <body>
    <div class="page-wrap">

      <!-- TOP BAR -->
      <div class="topbar">
        <div class="topbar-logo">&#9670; ChaiCode Cinema</div>
        <button class="logout-btn" id="logoutBtn">Sign Out</button>
      </div>

      <!-- HERO -->
      <div class="hero">
        <span class="now-showing">&#8212; Now Showing &#8212;</span>
        <h1 class="film-title">
          Dhurandhar<span class="accent">The Revenge</span>
        </h1>
        <p class="film-tagline">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <!-- DECORATIVE -->
      <div class="stripe">
        <div class="stripe-line"></div>
        <div class="stripe-dot"></div>
        <div class="stripe-dot" style="opacity:0.5;width:3px;height:3px;"></div>
        <div class="stripe-dot"></div>
        <div class="stripe-line r"></div>
      </div>

      <!-- LEGEND -->
      <div class="legend">
        <div class="legend-item"><div class="dot-avail"></div> Available</div>
        <div class="legend-sep"></div>
        <div class="legend-item"><div class="dot-booked"></div> Booked</div>
      </div>

      <!-- SCREEN -->
      <div class="screen-wrap">
        <div class="screen-bar"></div>
        <div class="screen-label">Screen</div>
      </div>

      <!-- SEAT GRID -->
      <div class="grid-outer">
        <div class="grid-inner">
          <table id="tbl" class="border-separate mx-auto" style="border-spacing: 10px;"></table>
        </div>
      </div>

      <div class="footer">ChaiCode Cinema &nbsp;&#9670;&nbsp; All seats subject to availability</div>
    </div>

    <!-- Custom alert (replaces window.alert) -->
    <script>
      window.alert = function(msg) {
        const overlay = document.createElement('div');
        overlay.className = 'ci-alert-overlay';
        const isSuccess = msg.toLowerCase().includes('success');
        const isError   = msg.toLowerCase().includes('fail') || msg.toLowerCase().includes('error') || msg.toLowerCase().includes("couldn't");
        overlay.innerHTML = `
          <div class="ci-alert-box">
            <p class="${isSuccess ? 'success' : isError ? 'error' : ''}">${msg}</p>
            <button class="ci-alert-btn" onclick="this.closest('.ci-alert-overlay').remove()">Dismiss</button>
          </div>`;
        document.body.appendChild(overlay);
      };
    </script>

    <!-- LOGOUT (new, design-only addition) -->
    <script>
      document.getElementById('logoutBtn').addEventListener('click', async function() {
        try {
          await fetch('/auth/logout', { method: 'POST' });
          window.location.href = '/auth/login';
        } catch(e) {
          alert('Logout failed. Please try again.');
        }
      });
    </script>

    <!-- ==================== ORIGINAL SCRIPT — UNTOUCHED ==================== -->
    <script>
      async function run() {
        const tbl = document.getElementById("tbl");
        const res = await fetch("/seats");
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");

          // Base aesthetic classes - added 'relative group' for tooltip positioning
          const baseClasses =
            "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("cursor-not-allowed")) {
              return; // Seat is already taken
            }

            try {
              const id = j[i].id; // Safe from loop closure
              // const name = prompt("Enter your name");
              
              let response = await fetch('/me');

              if(!response.ok){
                const refreshRes = await fetch('/auth/refresh');
                if (!refreshRes.ok) {
                  window.location.href = '/auth/login';
                  return;
                }
                response = await fetch('/me');
                if(!response.ok){
                  alert('Some Error Occured');
                  return;
                }
              }
              const userData = await response.json();
            
              const username = userData.username;
              if (!username) return;

              const res = await fetch(`/${id}/${username}`, { method: "PUT" });
              const data = await res.json();

              if (data.error) {
                alert("FAILED! Couldn't book! already booked.");
              } else {
                alert("Booked successfully!");
                // Visually transition to booked state upon success
                currentTd.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                currentTd.innerHTML = `
                            <span class="relative z-10">${id}</span>
                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                                Booked by: <span class="font-bold text-white ml-1">${username}</span>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                            </div>
                        `;
              }
            } catch (ex) {
              alert("error booking " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }
      run();
    </script>
    <!-- ==================== END ORIGINAL SCRIPT ==================== -->

    <!-- CSS overrides for seat cells rendered by the original JS -->
    <style>
      /* Available seats: gold outline style */
      #tbl td[class*="bg-emerald"] {
        background: rgba(245,200,66,0.04) !important;
        border-color: rgba(245,200,66,0.7) !important;
        color: var(--gold) !important;
        box-shadow: 0 0 14px rgba(245,200,66,0.12) !important;
      }
      #tbl td[class*="bg-emerald"]:hover {
        background: rgba(245,200,66,0.1) !important;
        border-color: var(--gold) !important;
        box-shadow: 0 0 28px rgba(245,200,66,0.35) !important;
      }
      /* Booked seats: muted crimson */
      #tbl td[class*="bg-rose"] {
        background: rgba(230,57,70,0.04) !important;
        border-color: rgba(230,57,70,0.2) !important;
        color: rgba(230,57,70,0.3) !important;
      }
      /* Tooltips on booked seats */
      #tbl td[class*="bg-rose"] .absolute {
        background: #1a0808 !important;
        border: 1px solid rgba(245,200,66,0.18) !important;
        color: rgba(253,246,227,0.65) !important;
        font-family: 'Space Mono', monospace !important;
        font-size: 0.62rem !important;
      }
      #tbl td[class*="bg-rose"] .absolute .font-bold {
        color: var(--gold) !important;
      }
      /* Seat numbers */
      #tbl td span.relative {
        font-family: 'Space Mono', monospace !important;
        font-size: 0.85rem !important;
        letter-spacing: 0.04em;
      }
    </style>
  </body>
</html>
