<!doctype html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center h-screen">

<div class="bg-slate-800 p-8 rounded-2xl w-96 shadow-xl">
  <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

  <form id="registerForm" class="flex flex-col gap-4">
    <input type="text" id="username" placeholder="Username"
      class="p-3 rounded bg-slate-700 outline-none" required>

    <input type="email" id="email" placeholder="Email"
      class="p-3 rounded bg-slate-700 outline-none" required>

    <input type="password" id="password" placeholder="Password"
      class="p-3 rounded bg-slate-700 outline-none" required>

    <button class="bg-emerald-500 p-3 rounded font-bold hover:bg-emerald-400">
      Register
    </button>
  </form>

  <p class="text-sm mt-4 text-center">
    Already have an account?
    <a href="/auth/login" class="text-emerald-400">Login</a>
  </p>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, email, password })
  });

  if (res.ok) {
    alert('Registered successfully');
    window.location.href = '/auth/login';
  } else {
    alert('Registration failed');
  }
});
</script>

</body>
</html>
