<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — ChaiCode Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --gold: #f5c842;
        --gold-dim: #c9a62e;
        --crimson: #e63946;
        --cream: #fdf6e3;
        --curtain: #1a0a0a;
        --panel: #110808;
        --border: rgba(245,200,66,0.18);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Syne', sans-serif;
        background-color: var(--curtain);
        color: var(--cream);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
        pointer-events: none;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        padding: 2rem 1.5rem;
      }

      .logo {
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold-dim);
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .logo span {
        display: block;
        font-size: 0.55rem;
        letter-spacing: 0.2em;
        color: rgba(253,246,227,0.25);
        margin-top: 0.3rem;
      }

      .card {
        background: rgba(10,4,4,0.6);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2.5rem 2rem;
        animation: fadeUp 0.45s ease both;
      }

      .eyebrow {
        font-family: 'Space Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--gold-dim);
        text-align: center;
        margin-bottom: 0.75rem;
      }

      .page-title {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 2rem;
        text-align: center;
        color: var(--cream);
        margin-bottom: 0.4rem;
        letter-spacing: -0.02em;
      }

      .page-title .accent { color: var(--gold); }

      .stripe {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        justify-content: center;
        margin: 1.2rem auto 2rem;
        max-width: 200px;
      }

      .stripe-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim)); }
      .stripe-line.r { background: linear-gradient(to left, transparent, var(--gold-dim)); }
      .stripe-dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }

      label {
        font-family: 'Space Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(253,246,227,0.45);
      }

      input {
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        background: rgba(0,0,0,0.35);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.75rem 1rem;
        color: var(--cream);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        letter-spacing: 0.05em;
      }

      input::placeholder { color: rgba(253,246,227,0.2); }

      input:focus {
        border-color: rgba(245,200,66,0.5);
        box-shadow: 0 0 0 3px rgba(245,200,66,0.06);
      }

      .btn {
        width: 100%;
        font-family: 'Space Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.85rem;
        border: 1px solid var(--gold);
        background: rgba(245,200,66,0.06);
        color: var(--gold);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
      }

      .btn:hover {
        background: rgba(245,200,66,0.14);
        box-shadow: 0 0 20px rgba(245,200,66,0.15);
      }

      .btn:active { transform: scale(0.98); }

      .switch {
        font-family: 'Space Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.12em;
        text-align: center;
        margin-top: 1.5rem;
        color: rgba(253,246,227,0.3);
      }

      .switch a {
        color: var(--gold-dim);
        text-decoration: none;
        transition: color 0.15s;
      }

      .switch a:hover { color: var(--gold); }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Custom alert */
      .ci-alert-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: fadeUp 0.2s ease;
      }

      .ci-alert-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2.5rem 2.5rem;
        max-width: 340px;
        width: 90%;
        text-align: center;
        font-family: 'Space Mono', monospace;
      }

      .ci-alert-box p {
        font-size: 0.78rem;
        color: var(--cream);
        line-height: 1.8;
        margin-bottom: 1.5rem;
        letter-spacing: 0.05em;
      }

      .ci-alert-box p.success { color: var(--gold); }
      .ci-alert-box p.error   { color: var(--crimson); }

      .ci-alert-btn {
        font-family: 'Space Mono', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.5rem 1.5rem;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--cream);
        cursor: pointer;
        transition: all 0.15s;
        border-radius: 2px;
      }

      .ci-alert-btn:hover { border-color: var(--gold); color: var(--gold); }
    </style>
  </head>
  <body>
    <div class="wrap">

      <div class="logo">&#9670; ChaiCode Cinema <span>Auth Portal</span></div>

      <div class="card">
        <div class="eyebrow">&#8212; New arrival &#8212;</div>
        <h1 class="page-title">Join <span class="accent">Us</span></h1>

        <div class="stripe">
          <div class="stripe-line"></div>
          <div class="stripe-dot"></div>
          <div class="stripe-dot" style="opacity:0.5;width:3px;height:3px;"></div>
          <div class="stripe-dot"></div>
          <div class="stripe-line r"></div>
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="your_name" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <button class="btn" id="registerBtn">Claim Your Seat</button>

        <p class="switch">
          Already a patron? <a href="/auth/login">&larr; Sign in</a>
        </p>
      </div>

    </div>

    <script>
      window.alert = function(msg) {
        const overlay = document.createElement('div');
        overlay.className = 'ci-alert-overlay';
        const isSuccess = msg.toLowerCase().includes('success');
        const isError   = msg.toLowerCase().includes('fail') || msg.toLowerCase().includes('error');
        overlay.innerHTML = `
          <div class="ci-alert-box">
            <p class="${isSuccess ? 'success' : isError ? 'error' : ''}">${msg}</p>
            <button class="ci-alert-btn" onclick="this.closest('.ci-alert-overlay').remove()">Dismiss</button>
          </div>`;
        document.body.appendChild(overlay);
      };

      document.getElementById('registerBtn').addEventListener('click', async function() {
        const username = document.getElementById('username').value;
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!username || !email || !password) { alert('Please fill in all fields.'); return; }

        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        if (res.ok) {
          alert('Registration successful!');
          setTimeout(() => { window.location.href = '/auth/login'; }, 1800);
        } else {
          alert('Registration failed. Please try again.');
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('registerBtn').click();
      });
    </script>
  </body>
</html>
